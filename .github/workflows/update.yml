name: Daily GitHub Trending Scraper

# 触发条件（类似挂单条件）
on:
  schedule:
    # 每天 UTC 时间 00:00 执行（对应北京时间上午 8:00，正好是你看盘前）
    - cron: '0 0 * * *'
  workflow_dispatch: # 保留手动触发的按钮，方便我们随时测试

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予这个虚拟员工修改仓库文件的权限

    steps:
    - name: 检出当前代码
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖包 (类似准备交易软件)
      run: |
        pip install requests beautifulsoup4

    - name: 运行离岸抓取探针
      run: python scraper.py

    - name: 提交并推送生成的 JSON 数据 (交割结算)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add trending.json
        # 如果数据有变化就提交，没变化就静默
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 自动更新每日 Trending 榜单" && git push)
